# .github/workflows/deploy.yml
#
# Build & Deploy: Cookbook Site → ECR → ECS Fargate
#
# Triggers on push to main (when app/ changes). Authenticates via OIDC
# (no stored secrets). Builds the Astro static site, packages it in an
# nginx container, pushes to ECR, and tells ECS to roll out a new deployment.
#
# OIDC Authentication (configured in Phase 2, modules/iam/main.tf):
#   1. GitHub generates a short-lived JWT for this workflow run
#   2. JWT claims include: repo, branch, workflow, actor
#   3. aws-actions/configure-aws-credentials sends JWT to AWS STS
#   4. STS validates against our OIDC provider + trust policy
#   5. Temporary credentials issued (expire when workflow ends)
#   No secrets stored. No keys to rotate. This is the way.

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'                # Only trigger when app code changes
      - '.github/workflows/deploy.yml'  # Also trigger when this workflow changes
  workflow_dispatch: {}          # Manual trigger from GitHub UI

permissions:
  id-token: write   # Required for OIDC token exchange with AWS
  contents: read    # Required for actions/checkout

env:
  AWS_REGION: us-east-1
  ECR_REPO: aws-lab-dev-app
  ECS_CLUSTER: aws-lab-dev-cluster   # Verify: terraform output ecs_cluster_name
  ECS_SERVICE: aws-lab-dev-app       # Verify: terraform output ecs_service_name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------
      # Checkout the infra repo (contains app/, Dockerfile, nginx config)
      # -----------------------------------------------------------------
      - name: Checkout infra repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Clone the cookbook recipes from the separate content repo.
      # This is a public repo, so no auth needed.
      # The sync_recipes.py script reads from this to generate Astro
      # content files with proper YAML frontmatter.
      # -----------------------------------------------------------------
      - name: Clone cookbook recipes
        run: git clone https://github.com/cpitzi/ice_cream_book.git /tmp/ice_cream_book

      # -----------------------------------------------------------------
      # Build the Astro static site (happens in CI, not in Docker)
      # This gives us better error messages than a multi-stage Docker
      # build and keeps the Dockerfile dead simple.
      # -----------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Astro dependencies
        working-directory: app/ice_cream_site
        run: npm ci

      - name: Sync recipes into Astro content
        working-directory: app/ice_cream_site
        run: python3 sync_recipes.py
        env:
          RECIPE_SOURCE: /tmp/ice_cream_book/recipes

      - name: Build static site
        working-directory: app/ice_cream_site
        run: npx astro build

      # -----------------------------------------------------------------
      # AWS Authentication via OIDC
      # The role ARN comes from modules/iam — output: github_actions_role_arn
      #
      # KNOWN ISSUE: IAM roles with "github" in the name can sometimes
      # fail OIDC auth. If you hit "Not authorized to perform
      # sts:AssumeRoleWithWebIdentity", rename the role first.
      # See: https://github.com/aws-actions/configure-aws-credentials/issues/953
      # -----------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::365184644049:role/aws-lab-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------------------------------------
      # Docker Build & Push
      #
      # Build context is app/ — the simple Dockerfile copies pre-built
      # dist/ from ice_cream_site/dist/ into nginx, configured for
      # port 8080 with /health endpoint (matching ALB contract).
      #
      # Tags:
      #   :latest       → mutable convenience tag
      #   :<commit-sha> → immutable audit trail
      # -----------------------------------------------------------------
      - name: Build and push container image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "::group::Docker Build"
          docker build \
            -f app/Dockerfile \
            -t $REGISTRY/$ECR_REPO:latest \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            app/
          echo "::endgroup::"

          echo "::group::Docker Push"
          docker push $REGISTRY/$ECR_REPO:latest
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "::endgroup::"

          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`$REGISTRY/$ECR_REPO\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** \`latest\`, \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------
      # ECS Rolling Deployment
      #
      # --force-new-deployment tells ECS to start new tasks even if the
      # task definition hasn't changed (because we're using :latest tag).
      #
      # The deployment process:
      #   1. ECS launches new tasks with the updated image
      #   2. New tasks register with the ALB target group
      #   3. ALB health checks pass (/health endpoint returns 200)
      #   4. Traffic shifts to new tasks
      #   5. Old tasks drain existing connections
      #   6. Old tasks stop → zero downtime
      # -----------------------------------------------------------------
      - name: Force new ECS deployment
        run: |
          echo "Deploying commit ${{ github.sha }} to ECS..."
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --no-cli-pager

      # -----------------------------------------------------------------
      # Wait for the deployment to stabilize.
      # This step blocks until ECS confirms all new tasks are healthy
      # and the old tasks have been drained. Timeout is ~10 minutes.
      # If this times out, check ECS events for why tasks aren't starting.
      # -----------------------------------------------------------------
      - name: Wait for deployment to stabilize
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

          echo "### ✅ Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** \`$ECS_CLUSTER\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** \`$ECS_SERVICE\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** [hellavisible.net](https://hellavisible.net)" >> $GITHUB_STEP_SUMMARY
